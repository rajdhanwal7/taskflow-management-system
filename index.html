<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles/utilities.css">
<link rel="stylesheet" href="./styles/main.css">

</head>

<body>

<div class="app-shell">

<header class="header">

    <div class="brand">

        <h1 class="logo">
            TaskFlow
        </h1>

        <p class="subtitle">
            Stay focused. Stay organized.
        </p>

    </div>

    <button
        id="themeToggle"
        class="theme-toggle"
        aria-label="Toggle Theme">

        🌙

    </button>

</header>

<main class="main-content">

    <section class="task-creator">

        <form
            id="taskForm"
            class="task-form">

            <div class="input-wrapper">

                <input
                    id="taskInput"
                    type="text"
                    class="task-input"
                    placeholder="Add a new task..."
                    autocomplete="off">

                <div
                    id="validationError"
                    class="validation-error">
                </div>

            </div>

            <button
                type="submit"
                class="add-btn">

                +

            </button>

        </form>

    </section>

    <section class="stats-bar">

        <div class="stat-item">

            <span
                id="totalTasks"
                class="stat-number">

                0

            </span>

            <span class="stat-label">

                Tasks

            </span>

        </div>

        <div class="stat-item">

            <span
                id="completedTasks"
                class="stat-number">

                0

            </span>

            <span class="stat-label">

                Done

            </span>

        </div>

        <div class="stat-item">

            <span
                id="pendingTasks"
                class="stat-number">

                0

            </span>

            <span class="stat-label">

                Pending

            </span>

        </div>

        <div class="stat-item">

            <span
                id="completionPercent"
                class="stat-number">

                0%

            </span>

            <span class="stat-label">

                Progress

            </span>

        </div>

    </section>

    <section class="controls-section">

        <div class="filters">

            <button
                class="filter-btn active"
                data-filter="all">

                All

            </button>

            <button
                class="filter-btn"
                data-filter="active">

                Active

            </button>

            <button
                class="filter-btn"
                data-filter="completed">

                Completed

            </button>

        </div>

        <div class="search-wrapper">

            <input
                id="searchInput"
                class="search-input"
                type="search"
                placeholder="Search tasks">

        </div>

    </section>

    <section
        id="undoSection"
        class="undo-section"
        style="display:none;">

        <button
            id="undoBtn"
            class="undo-btn">

            Undo

        </button>

    </section>

    <section class="tasks-section">

        <ul
            id="taskList"
            class="task-list">
        </ul>

        <div
            id="emptyState"
            class="empty-state">

            <div class="empty-icon">
                ✨
            </div>

            <h2 class="empty-title">
                No tasks yet
            </h2>

            <p class="empty-text">
                Add your first task and start organizing your day.
            </p>

            <button
                id="emptyCTA"
                class="empty-cta">

                Create Task

            </button>

        </div>

    </section>

</main>


</div>

<div
    id="deleteModal"
    class="modal-overlay"
    style="display:none;">


<div class="modal">

    <h3
        id="modalTitle"
        class="modal-title">

        Delete Task?

    </h3>

    <p class="modal-text">

        This action cannot be undone.

    </p>

    <div class="modal-buttons">

        <button
            id="cancelDelete"
            class="modal-btn cancel">

            Cancel

        </button>

        <button
            id="confirmDelete"
            class="modal-btn confirm">

            Delete

        </button>

    </div>

</div>


</div>

<script type="module" src="./app.js"></script>

</body>
</html>
